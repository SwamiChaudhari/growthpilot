<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <!-- Logo gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <!-- Accent gradient for stats -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <!-- Subtle pattern gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#334155;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#475569;stop-opacity:0.1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle geometric patterns - diagonal lines -->
  <g opacity="0.07">
    <line x1="0" y1="100" x2="400" y2="0" stroke="#94a3b8" stroke-width="1"/>
    <line x1="0" y1="200" x2="600" y2="0" stroke="#94a3b8" stroke-width="1"/>
    <line x1="0" y1="350" x2="900" y2="0" stroke="#94a3b8" stroke-width="1"/>
    <line x1="800" y1="630" x2="1200" y2="400" stroke="#94a3b8" stroke-width="1"/>
    <line x1="900" y1="630" x2="1200" y2="480" stroke="#94a3b8" stroke-width="1"/>
  </g>

  <!-- Subtle geometric patterns - circles -->
  <g opacity="0.05">
    <circle cx="1050" cy="100" r="120" fill="none" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="1100" cy="80" r="200" fill="none" stroke="#8b5cf6" stroke-width="1"/>
    <circle cx="150" cy="550" r="150" fill="none" stroke="#22d3ee" stroke-width="1"/>
    <circle cx="100" cy="580" r="80" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  </g>

  <!-- Dot grid pattern top-right -->
  <g opacity="0.06">
    <circle cx="950" cy="50" r="2" fill="#94a3b8"/>
    <circle cx="980" cy="50" r="2" fill="#94a3b8"/>
    <circle cx="1010" cy="50" r="2" fill="#94a3b8"/>
    <circle cx="1040" cy="50" r="2" fill="#94a3b8"/>
    <circle cx="1070" cy="50" r="2" fill="#94a3b8"/>
    <circle cx="1100" cy="50" r="2" fill="#94a3b8"/>
    <circle cx="1130" cy="50" r="2" fill="#94a3b8"/>
    <circle cx="1160" cy="50" r="2" fill="#94a3b8"/>
    <circle cx="950" cy="80" r="2" fill="#94a3b8"/>
    <circle cx="980" cy="80" r="2" fill="#94a3b8"/>
    <circle cx="1010" cy="80" r="2" fill="#94a3b8"/>
    <circle cx="1040" cy="80" r="2" fill="#94a3b8"/>
    <circle cx="1070" cy="80" r="2" fill="#94a3b8"/>
    <circle cx="1100" cy="80" r="2" fill="#94a3b8"/>
    <circle cx="1130" cy="80" r="2" fill="#94a3b8"/>
    <circle cx="1160" cy="80" r="2" fill="#94a3b8"/>
    <circle cx="950" cy="110" r="2" fill="#94a3b8"/>
    <circle cx="980" cy="110" r="2" fill="#94a3b8"/>
    <circle cx="1010" cy="110" r="2" fill="#94a3b8"/>
    <circle cx="1040" cy="110" r="2" fill="#94a3b8"/>
    <circle cx="1070" cy="110" r="2" fill="#94a3b8"/>
    <circle cx="1100" cy="110" r="2" fill="#94a3b8"/>
    <circle cx="1130" cy="110" r="2" fill="#94a3b8"/>
    <circle cx="1160" cy="110" r="2" fill="#94a3b8"/>
    <circle cx="950" cy="140" r="2" fill="#94a3b8"/>
    <circle cx="980" cy="140" r="2" fill="#94a3b8"/>
    <circle cx="1010" cy="140" r="2" fill="#94a3b8"/>
    <circle cx="1040" cy="140" r="2" fill="#94a3b8"/>
    <circle cx="1070" cy="140" r="2" fill="#94a3b8"/>
    <circle cx="1100" cy="140" r="2" fill="#94a3b8"/>
    <circle cx="1130" cy="140" r="2" fill="#94a3b8"/>
    <circle cx="1160" cy="140" r="2" fill="#94a3b8"/>
  </g>

  <!-- Dot grid pattern bottom-left -->
  <g opacity="0.06">
    <circle cx="50" cy="500" r="2" fill="#94a3b8"/>
    <circle cx="80" cy="500" r="2" fill="#94a3b8"/>
    <circle cx="110" cy="500" r="2" fill="#94a3b8"/>
    <circle cx="140" cy="500" r="2" fill="#94a3b8"/>
    <circle cx="170" cy="500" r="2" fill="#94a3b8"/>
    <circle cx="200" cy="500" r="2" fill="#94a3b8"/>
    <circle cx="230" cy="500" r="2" fill="#94a3b8"/>
    <circle cx="260" cy="500" r="2" fill="#94a3b8"/>
    <circle cx="50" cy="530" r="2" fill="#94a3b8"/>
    <circle cx="80" cy="530" r="2" fill="#94a3b8"/>
    <circle cx="110" cy="530" r="2" fill="#94a3b8"/>
    <circle cx="140" cy="530" r="2" fill="#94a3b8"/>
    <circle cx="170" cy="530" r="2" fill="#94a3b8"/>
    <circle cx="200" cy="530" r="2" fill="#94a3b8"/>
    <circle cx="230" cy="530" r="2" fill="#94a3b8"/>
    <circle cx="260" cy="530" r="2" fill="#94a3b8"/>
    <circle cx="50" cy="560" r="2" fill="#94a3b8"/>
    <circle cx="80" cy="560" r="2" fill="#94a3b8"/>
    <circle cx="110" cy="560" r="2" fill="#94a3b8"/>
    <circle cx="140" cy="560" r="2" fill="#94a3b8"/>
    <circle cx="170" cy="560" r="2" fill="#94a3b8"/>
    <circle cx="200" cy="560" r="2" fill="#94a3b8"/>
    <circle cx="230" cy="560" r="2" fill="#94a3b8"/>
    <circle cx="260" cy="560" r="2" fill="#94a3b8"/>
    <circle cx="50" cy="590" r="2" fill="#94a3b8"/>
    <circle cx="80" cy="590" r="2" fill="#94a3b8"/>
    <circle cx="110" cy="590" r="2" fill="#94a3b8"/>
    <circle cx="140" cy="590" r="2" fill="#94a3b8"/>
    <circle cx="170" cy="590" r="2" fill="#94a3b8"/>
    <circle cx="200" cy="590" r="2" fill="#94a3b8"/>
    <circle cx="230" cy="590" r="2" fill="#94a3b8"/>
    <circle cx="260" cy="590" r="2" fill="#94a3b8"/>
  </g>

  <!-- Accent line top-left -->
  <line x1="60" y1="180" x2="60" y2="420" stroke="url(#accentGrad)" stroke-width="3" opacity="0.4" filter="url(#softGlow)"/>

  <!-- Logo: Rounded square with G -->
  <g transform="translate(100, 180)">
    <!-- Glow behind logo -->
    <rect x="-5" y="-5" width="90" height="90" rx="22" fill="#6366f1" opacity="0.15" filter="url(#softGlow)"/>
    <!-- Logo background -->
    <rect x="0" y="0" width="80" height="80" rx="20" fill="url(#logoGrad)" filter="url(#glow)"/>
    <!-- Letter G -->
    <text x="40" y="62" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="middle">G</text>
  </g>

  <!-- Brand name next to logo -->
  <text x="200" y="228" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="white" dominant-baseline="middle">GrowthPilot</text>
  <text x="200" y="258" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#94a3b8" dominant-baseline="middle" letter-spacing="3">GROWTH PARTNER</text>

  <!-- Main headline -->
  <text x="100" y="340" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="800" fill="white">We Build</text>
  <text x="100" y="405" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="800" fill="url(#accentGrad)">Growth Engines</text>

  <!-- Subtitle -->
  <text x="100" y="465" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#94a3b8">High-converting websites &amp; digital growth systems</text>
  <text x="100" y="495" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#94a3b8">for local businesses across India</text>

  <!-- Stats badge -->
  <g transform="translate(100, 530)">
    <rect x="0" y="0" width="420" height="44" rx="22" fill="#1e293b" stroke="#334155" stroke-width="1" opacity="0.8"/>
    <text x="210" y="28" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="url(#accentGrad)" text-anchor="middle" dominant-baseline="middle">50+ Businesses Grown  |  3x More Leads</text>
  </g>

  <!-- Phone at bottom right -->
  <text x="1100" y="598" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#64748b" text-anchor="end">+91 93567 33878</text>

  <!-- Subtle bottom accent line -->
  <line x1="100" y1="610" x2="900" y2="610" stroke="#334155" stroke-width="1" opacity="0.5"/>
</svg>
